[tox]
requires =
    tox>=4.2
env_list =
    py313
skip_missing_interpreters = true

[testenv]
description = run the tests with pytest under {envname}
deps =
    -rrequirements.txt
    pytest
    pytest-cov
set_env =
    CI = true
commands =
    pytest

[pytest]
addopts =
    --doctest-modules
    --verbosity=2
    --cov
    --cov-report=term
    --cov-report=html
    --cov-report=xml
    --junitxml=dist/junit.xml

[coverage:run]
branch = True

[coverage:report]
show_missing = True
skip_empty = True

[coverage:html]
directory = dist/htmlcov

[coverage:xml]
output = dist/coverage.xml

[check-wheel-contents]
ignore =
    W002,
