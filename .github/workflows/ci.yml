name: CI

on:
  push:
    branches: main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-3.13-${{ hashFiles('requirements.txt', 'tox.ini') }}
          restore-keys: pip-3.13-

      - name: Install tox
        run: pip install --upgrade pip wheel tox

      - name: Run tox
        run: tox -v
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONUNBUFFERED: "1"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist
          path: dist/

  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: buildpacks/github-actions/setup-pack@v5.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container image
        id: build
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:pr-${{ github.event.number }}"
          pack build "${IMAGE}" \
            --builder tools-harbor.wmcloud.org/toolforge/heroku-builder:24_0.21.5 \
            --publish
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
