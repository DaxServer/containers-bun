name: CI

on:
  push:
    branches: main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-3.13-${{ hashFiles('requirements.txt', 'tox.ini') }}
          restore-keys: pip-3.13-

      - name: Install tox
        run: pip install --upgrade pip wheel tox

      - name: Run tox
        run: tox -v
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONUNBUFFERED: "1"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist
          path: dist/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: dist/coverage.xml
