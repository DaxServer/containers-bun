name: CI

on:
  push:
    branches: main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: buildpacks/github-actions/setup-pack@v5.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container image
        id: build
        run: |
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          IMAGE="ghcr.io/${REPO_LOWER}:pr-${{ github.event.number }}"
          echo "REPO_LOWER=${REPO_LOWER}" >> $GITHUB_ENV
          pack build "${IMAGE}" \
            --builder tools-harbor.wmcloud.org/toolforge/heroku-builder:24_0.21.5 \
            --buildpack ./buildpacks/bun \
            --buildpack heroku/go@2.2.2 \
            --buildpack heroku/procfile \
            --publish
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ env.REPO_LOWER }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
